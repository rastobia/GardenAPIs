services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "GardenApi!Str0ng"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "GardenApi!Str0ng" -Q "SELECT 1" -b -C
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=GardenDb;User Id=sa;Password=GardenApi!Str0ng;TrustServerCertificate=true;MultipleActiveResultSets=true
      - JwtSettings__Secret=docker-garden-api-super-secret-jwt-key-for-dev-use-only-32ch
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
